<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>chatroom</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0e; --surface: #161616; --border: #2a2a2a; --border-light: #333;
    --text: #e8e8e8; --muted: #666; --accent: #c8f542; --accent-dim: #a8d030;
    --danger: #f87171; --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }

  /* OVERLAY / MODAL */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 1rem;
  }
  .overlay.hidden { display: none; }
  .modal {
    background: var(--surface); border: 1px solid var(--border-light);
    padding: 2rem; width: 100%; max-width: 360px;
  }
  .modal h3 { font-family: var(--mono); font-size: 0.95rem; color: var(--accent); margin-bottom: 0.75rem; }
  .modal p { font-size: 13px; color: var(--muted); margin-bottom: 1.25rem; line-height: 1.6; }
  .modal input {
    width: 100%; padding: 10px 12px; margin-bottom: 10px;
    background: var(--bg); border: 1px solid var(--border-light);
    color: var(--text); font-family: var(--mono); font-size: 13px; outline: none;
    transition: border-color 0.15s;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal input::placeholder { color: var(--muted); }
  .modal-btns { display: flex; gap: 8px; }
  .btn-primary {
    flex: 1; padding: 10px; background: var(--accent); color: #0e0e0e;
    border: none; font-family: var(--mono); font-size: 12px; font-weight: 500;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--accent-dim); }
  .btn-secondary {
    flex: 1; padding: 10px; background: transparent; color: var(--muted);
    border: 1px solid var(--border); font-family: var(--mono); font-size: 12px;
    cursor: pointer; transition: color 0.15s;
  }
  .btn-secondary:hover { color: var(--text); }
  .modal-error { font-size: 12px; color: var(--danger); margin-top: 8px; font-family: var(--mono); display: none; }

  /* JOIN SCREEN */
  #join-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
  .join-box { width: 100%; max-width: 360px; }
  .join-box h2 { font-family: var(--mono); font-size: 1rem; color: var(--accent); margin-bottom: 0.5rem; }
  .join-box p { font-size: 13px; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.6; }
  .join-box input {
    width: 100%; padding: 11px 14px; font-size: 15px;
    background: var(--surface); border: 1px solid var(--border-light);
    color: var(--text); font-family: var(--mono); outline: none;
    margin-bottom: 10px; transition: border-color 0.15s;
  }
  .join-box input:focus { border-color: var(--accent); }
  .join-box input::placeholder { color: var(--muted); }
  #join-btn {
    width: 100%; padding: 11px; background: var(--accent); color: #0e0e0e;
    border: none; font-family: var(--mono); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: background 0.15s;
  }
  #join-btn:hover { background: var(--accent-dim); }
  #join-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #google-btn {
    width: 100%; padding: 12px; background: #fff; color: #333;
    border: 1px solid #ddd; font-family: var(--sans); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background 0.15s; display: flex; align-items: center; justify-content: center;
    margin-bottom: 10px;
  }
  #google-btn:hover { background: #f5f5f5; }
  #google-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .user-avatar {
    width: 28px; height: 28px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
  }
  .user-avatar-placeholder {
    width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0;
  }
  #join-error { font-size: 12px; color: var(--danger); margin-top: 0.75rem; font-family: var(--mono); display: none; }

  /* CHAT SCREEN */
  #chat-screen { display: none; height: 100vh; }
  .chat-layout { display: flex; height: 100%; }

  /* SIDEBAR */
  #sidebar {
    width: 210px; flex-shrink: 0; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
  }
  #sidebar-header {
    padding: 14px 14px 10px; border-bottom: 1px solid var(--border);
    font-family: var(--mono); font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  #room-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .room-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 14px; font-family: var(--mono); font-size: 13px;
    color: var(--muted); cursor: pointer; transition: background 0.1s, color 0.1s; gap: 6px;
  }
  .room-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .room-item.active { color: var(--accent); background: rgba(200,245,66,0.07); }
  .room-item .room-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .room-lock { font-size: 10px; color: var(--muted); flex-shrink: 0; }
  #new-room-area { padding: 10px; border-top: 1px solid var(--border); }
  #new-room-input {
    width: 100%; padding: 7px 10px; font-size: 12px;
    background: var(--bg); border: 1px solid var(--border-light);
    color: var(--text); font-family: var(--mono); outline: none;
    transition: border-color 0.15s; margin-bottom: 6px;
  }
  #new-room-input:focus { border-color: var(--accent); }
  #new-room-input::placeholder { color: var(--muted); }
  .room-create-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
  .lock-toggle {
    padding: 7px 10px; background: transparent; border: 1px solid var(--border);
    color: var(--muted); font-size: 12px; cursor: pointer; transition: color 0.15s, border-color 0.15s; flex-shrink: 0;
  }
  .lock-toggle.on { color: var(--accent); border-color: var(--accent); }
  #new-room-btn {
    width: 100%; padding: 7px; background: transparent; color: var(--accent);
    border: 1px solid var(--accent); font-family: var(--mono); font-size: 11px;
    cursor: pointer; transition: background 0.15s;
  }
  #new-room-btn:hover { background: rgba(200,245,66,0.1); }

  /* MAIN */
  .chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
  #chat-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .live-pill { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  #room-title { font-family: var(--mono); font-size: 14px; color: var(--text); }
  #presence-count { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  #leave-btn {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    background: none; border: 1px solid var(--border); padding: 5px 12px;
    cursor: pointer; transition: color 0.15s, border-color 0.15s;
  }
  #leave-btn:hover { color: var(--danger); border-color: var(--danger); }

  #messages {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    display: flex; flex-direction: column; gap: 1px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); }

  .msg { display: flex; gap: 14px; padding: 5px 8px; border-radius: 2px; transition: background 0.1s; align-items: baseline; }
  .msg:hover { background: rgba(255,255,255,0.03); }
  .msg-time { font-family: var(--mono); font-size: 10px; color: var(--muted); flex-shrink: 0; width: 40px; text-align: right; user-select: none; }
  .msg-name { font-family: var(--mono); font-size: 12px; font-weight: 500; flex-shrink: 0; margin-right: 2px; }
  .msg-text { font-size: 14px; line-height: 1.55; word-break: break-word; color: #c8c8c8; flex: 1; }
  .msg-gif { max-width: 240px; max-height: 200px; border-radius: 4px; display: block; margin-top: 4px; }
  .msg.gif-msg { align-items: flex-start; }

  .sys-row { display: flex; align-items: center; justify-content: center; padding: 8px 0; }
  .sys-pill { font-family: var(--mono); font-size: 10px; color: var(--muted); border: 1px solid var(--border); padding: 2px 12px; letter-spacing: 0.04em; }

  #typing-bar { min-height: 22px; padding: 2px 28px 4px; font-family: var(--mono); font-size: 11px; color: var(--muted); font-style: italic; }

  /* INPUT BAR */
  #input-bar { display: flex; flex-direction: column; padding: 10px 20px 14px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; position: relative; }
  .input-row { display: flex; gap: 0; }
  .input-actions { display: flex; gap: 6px; margin-bottom: 8px; }
  .action-btn {
    padding: 5px 10px; background: transparent; border: 1px solid var(--border);
    color: var(--muted); font-size: 14px; cursor: pointer; transition: color 0.15s, border-color 0.15s;
    border-radius: 2px;
  }
  .action-btn:hover { color: var(--text); border-color: var(--border-light); }
  #msg-input {
    flex: 1; padding: 10px 14px; font-size: 14px;
    background: var(--bg); border: 1px solid var(--border-light); border-right: none;
    color: var(--text); font-family: var(--sans); outline: none; transition: border-color 0.15s;
  }
  #msg-input:focus { border-color: var(--accent); }
  #msg-input::placeholder { color: var(--muted); }
  #send-btn {
    padding: 10px 20px; background: var(--accent); color: #0e0e0e;
    border: none; font-family: var(--mono); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: background 0.15s; flex-shrink: 0;
  }
  #send-btn:hover { background: var(--accent-dim); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* EMOJI PANEL */
  #emoji-panel {
    position: absolute; bottom: 100%; left: 20px;
    background: var(--surface); border: 1px solid var(--border-light);
    padding: 10px; width: 300px; max-height: 220px; overflow-y: auto;
    display: none; z-index: 50;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #emoji-panel.open { display: block; }
  .emoji-search {
    width: 100%; padding: 6px 10px; margin-bottom: 8px;
    background: var(--bg); border: 1px solid var(--border-light);
    color: var(--text); font-family: var(--mono); font-size: 12px; outline: none;
  }
  .emoji-grid { display: flex; flex-wrap: wrap; gap: 4px; }
  .emoji-btn {
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    font-size: 18px; cursor: pointer; border-radius: 4px; border: none; background: transparent;
    transition: background 0.1s;
  }
  .emoji-btn:hover { background: rgba(255,255,255,0.08); }

  /* GIF PANEL */
  #gif-panel {
    position: absolute; bottom: 100%; left: 20px;
    background: var(--surface); border: 1px solid var(--border-light);
    padding: 10px; width: 340px; max-height: 280px;
    display: none; z-index: 50; flex-direction: column;
  }
  #gif-panel.open { display: flex; }
  .gif-search-row { display: flex; gap: 6px; margin-bottom: 8px; }
  #gif-search-input {
    flex: 1; padding: 7px 10px;
    background: var(--bg); border: 1px solid var(--border-light);
    color: var(--text); font-family: var(--mono); font-size: 12px; outline: none;
    transition: border-color 0.15s;
  }
  #gif-search-input:focus { border-color: var(--accent); }
  #gif-search-input::placeholder { color: var(--muted); }
  #gif-search-btn {
    padding: 7px 12px; background: var(--accent); color: #0e0e0e;
    border: none; font-family: var(--mono); font-size: 11px; font-weight: 500; cursor: pointer;
  }
  #gif-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
    overflow-y: auto; flex: 1;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .gif-thumb {
    width: 100%; aspect-ratio: 1; object-fit: cover; cursor: pointer;
    border-radius: 2px; transition: opacity 0.15s; border: 2px solid transparent;
  }
  .gif-thumb:hover { opacity: 0.8; border-color: var(--accent); }
  #gif-status { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: center; padding: 20px 0; }

  /* LINK PREVIEW */
  .link-preview {
    display: flex; gap: 10px; margin-top: 6px; max-width: 380px;
    border: 1px solid var(--border); border-left: 3px solid var(--accent-dim);
    background: var(--bg); padding: 8px 10px; border-radius: 2px; cursor: pointer;
  }
  .link-preview:hover { border-left-color: var(--accent); }
  .link-preview-thumb { width: 80px; height: 54px; object-fit: cover; border-radius: 2px; flex-shrink: 0; }
  .link-preview-info { display: flex; flex-direction: column; gap: 3px; min-width: 0; justify-content: center; }
  .link-preview-title { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .link-preview-domain { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .link-preview-desc { font-size: 11px; color: var(--muted); overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .yt-wrap { margin-top: 6px; max-width: 380px; }
  .yt-embed { width: 100%; aspect-ratio: 16/9; border: none; border-radius: 2px; display: block; }
  .msg-link { color: var(--accent-dim); text-decoration: underline; word-break: break-all; }
  .censored { background: var(--border-light); color: transparent; border-radius: 2px; user-select: none; letter-spacing: -0.5px; }
</style>
</head>

<!-- JOIN -->
<div id="join-screen">
  <div class="join-box">
    <h2>// chatroom</h2>

    </button>
    <div id="join-error"></div>
  </div>
</div>

<!-- PASSWORD MODAL -->
<div id="pw-overlay" class="overlay hidden">
  <div class="modal">
    <h3>🔒 private room</h3>
    <p id="pw-modal-desc">This room is password protected.</p>
    <input id="pw-input" type="password" placeholder="enter password..." />
    <div class="modal-btns">
      <button class="btn-primary" id="pw-submit-btn">enter room</button>
      <button class="btn-secondary" id="pw-cancel-btn">cancel</button>
    </div>
    <div class="modal-error" id="pw-error">wrong password</div>
  </div>
</div>

<!-- CREATE ROOM MODAL -->
<div id="create-overlay" class="overlay hidden">
  <div class="modal">
    <h3>// new room</h3>
    <p>Give your room a name. Toggle the lock to make it private.</p>
    <input id="create-name-input" type="text" maxlength="30" placeholder="room name..." spellcheck="false" autocomplete="off" />
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
      <input id="create-lock-check" type="checkbox" style="width:auto;margin:0;" />
      <label for="create-lock-check" style="font-family:var(--mono);font-size:12px;color:var(--muted);cursor:pointer;">private room (password protected)</label>
    </div>
    <div id="create-pw-field" style="display:none;">
      <input id="create-pw-input" type="password" placeholder="set a password..." />
    </div>
    <div class="modal-btns">
      <button class="btn-primary" id="create-confirm-btn">create</button>
      <button class="btn-secondary" id="create-cancel-btn">cancel</button>
    </div>
    <div class="modal-error" id="create-error"></div>
  </div>
</div>

<!-- CHAT -->
<div id="chat-screen">
  <div class="chat-layout">
    <div id="sidebar">
      <div id="sidebar-header">rooms</div>
      <div id="room-list"></div>
      <div id="new-room-area">
        <button id="new-room-btn">+ new room</button>
      </div>
    </div>
    <div class="chat-main">
      <div id="chat-header">
        <div class="header-left">
          <div class="live-pill"><div class="live-dot"></div>live</div>
          <div id="room-title">#general</div>
        </div>
        <div id="presence-count"></div>
        <button id="leave-btn">leave ×</button>
      </div>
      <div id="messages" role="log" aria-live="polite"></div>
      <div id="typing-bar" aria-live="polite"></div>
      <div id="input-bar">
        <div class="input-actions">
          <button class="action-btn" id="emoji-btn" title="Emoji">😊</button>
          <button class="action-btn" id="gif-btn" title="GIF">GIF</button>
        </div>
        <div id="emoji-panel">
          <input class="emoji-search" id="emoji-search" type="text" placeholder="search emoji..." />
          <div class="emoji-grid" id="emoji-grid"></div>
        </div>
        <div id="gif-panel">
          <div class="gif-search-row">
            <input id="gif-search-input" type="text" placeholder="search GIFs..." />
            <button id="gif-search-btn">search</button>
          </div>
          <div id="gif-status">enter a search above</div>
          <div id="gif-grid"></div>
        </div>
        <div class="input-row">
          <input id="msg-input" type="text" maxlength="400" placeholder="say something..." autocomplete="off" />
          <button id="send-btn">send</button>
        </div>
      </div>
    </div>
  </div>
</div>

// leet-speak normalizer
function normalizeLeet(str) {
  return str.toLowerCase()
    .replace(/@/g,'a').replace(/4/g,'a')
    .replace(/3/g,'e').replace(/€/g,'e')
    .replace(/1/g,'i').replace(/!/g,'i').replace(/\|/g,'i')
    .replace(/0/g,'o')
    .replace(/5/g,'s').replace(/\$/g,'s')
    .replace(/7/g,'t').replace(/\+/g,'t')
    .replace(/ph/g,'f').replace(/ck/g,'k')
    .replace(/[*.,\-_]/g,'');
}

// combined filter: manual list + bad-words library if loaded
let Filter = null;
let filterInstance = null;
(async () => {
  try {
    // load the bad-words JS library (~1400 words, community maintained)
    const mod = await import('https://cdn.jsdelivr.net/npm/bad-words@3.0.4/+esm');
    Filter = mod.default || mod.Filter;
    filterInstance = new Filter();
    // add extra phrases bad-words misses
    filterInstance.addWords(...SWEARS);
  } catch(e) { /* fallback to manual list only */ }
})();

function censor(token) {
  return `<span class="censored">${'█'.repeat(Math.max(token.length,1))}</span>`;
}

function filterSwears(text) {
  // phrase-level first
  let out = text;
  const phrases = SWEARS.filter(w => w.includes(' '));
  phrases.forEach(p => {
    const re = new RegExp(p.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
    out = out.replace(re, match => censor(match));
  });

  // word-level: use bad-words lib if available, else manual
  out = out.replace(/[\w@$!|0-9*]+/g, token => {
    if (token.startsWith('<')) return token; // skip already-censored
    const norm = normalizeLeet(token);
    // check manual list
    const manualHit = SWEARS.filter(w => !w.includes(' ')).find(w => {
      const nw = normalizeLeet(w);
      return norm === nw || norm.includes(nw);
    });
    if (manualHit) return censor(token);
    // check bad-words library
    if (filterInstance) {
      try { if (filterInstance.isProfane(token) || filterInstance.isProfane(norm)) return censor(token); }
      catch(e) {}
    }
    return token;
  });
  return out;
}

/* ── url detection ── */
const URL_RE = /https?:\/\/[^\s]+/g;
function getYouTubeId(url) {
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]{11})/);
  return m ? m[1] : null;
}
function renderTextWithLinks(text) {
  const filtered = filterSwears(esc(text));
  return filtered.replace(/https?:\/\/[^\s<]+/g, url => {
    const cleanUrl = url.replace(/&amp;/g, '&');
    return `<a class="msg-link" href="${esc(cleanUrl)}" target="_blank" rel="noopener">${url}</a>`;
  });
}
function buildLinkPreview(url) {
  const ytId = getYouTubeId(url);
  if (ytId) {
    const wrap = document.createElement('div');
    wrap.className = 'yt-wrap';
    wrap.innerHTML = `<iframe class="yt-embed" src="https://www.youtube.com/embed/${ytId}" allowfullscreen loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>`;
    return wrap;
  }
  // generic link preview card (no CORS — just show domain + link)
  try {
    const u = new URL(url);
    const card = document.createElement('div');
    card.className = 'link-preview';
    card.addEventListener('click', () => window.open(url, '_blank', 'noopener'));
    card.innerHTML =
      `<div class="link-preview-info">` +
      `<div class="link-preview-domain">${esc(u.hostname)}</div>` +
      `<div class="link-preview-title">${esc(u.hostname + u.pathname.slice(0,50))}</div>` +
      `</div>`;
    return card;
  } catch(e) { return null; }
}

/* ── render message ── */
function renderMsg(row) {
  const color = pickColor(row.username);
  const div = document.createElement('div');
  if (row.gif_url) {
    div.className = 'msg gif-msg';
    div.innerHTML =
      `<span class="msg-time">${fmtTime(row.created_at)}</span>` +
      `<span class="msg-name" style="color:${color}">${esc(row.username)}</span>` +
      `<span class="msg-text"><img class="msg-gif" src="${esc(row.gif_url)}" alt="gif" loading="lazy" /></span>`;
  } else {
    div.className = 'msg';
    const textHtml = renderTextWithLinks(row.content);
    const avatarHtml = row.avatar_url
      ? `<img class="user-avatar" src="${esc(row.avatar_url)}" alt="" />`
      : `<span class="user-avatar-placeholder" style="background:${color}22;color:${color}">${esc(row.username.slice(0,2).toUpperCase())}</span>`;
    div.innerHTML =
      `<span class="msg-time">${fmtTime(row.created_at)}</span>` +
      avatarHtml +
      `<span class="msg-name" style="color:${color}">${esc(row.username)}</span>` +
      `<span class="msg-text">${textHtml}</span>`;
    // add link previews below
    const urls = (row.content || '').match(URL_RE);
    if (urls) {
      const textSpan = div.querySelector('.msg-text');
      const seen = new Set();
      urls.forEach(url => {
        if (seen.has(url)) return; seen.add(url);
        const preview = buildLinkPreview(url);
        if (preview) textSpan.appendChild(preview);
      });
      div.className = 'msg gif-msg'; // reuse align-items:flex-start
    }
  }
  messagesEl.appendChild(div);
  scrollBottom();
}

function renderSys(text) {
  const div = document.createElement('div');
  div.className = 'sys-row';
  div.innerHTML = `<span class="sys-pill">${esc(text)}</span>`;
  messagesEl.appendChild(div);
  scrollBottom();
}

function updatePresence() {
  const n = Object.keys(presenceMap).length;
  presenceEl.textContent = n > 0 ? `${n} online` : '';
}

function showTyping(username) {
  if (username === myName) return;
  clearTimeout(typingMap[username]);
  typingMap[username] = setTimeout(() => { delete typingMap[username]; renderTyping(); }, 3000);
  renderTyping();
}
function renderTyping() {
  const names = Object.keys(typingMap).filter(n => n !== myName);
  if (!names.length) { typingBar.textContent = ''; return; }
  typingBar.textContent = names.length === 1
    ? `${names[0]} is typing...`
    : `${names.slice(0,-1).join(', ')} and ${names[names.length-1]} are typing...`;
}

/* ── password check ── */
function tryEnterRoom(room) {
  if (room.name === currentRoom) return;
  if (!room.locked || unlockedRooms.has(room.name)) {
    switchRoom(room.name);
    return;
  }
  // show password modal
  pendingRoom = room;
  hideErr(pwError);
  pwInput.value = '';
  $('pw-modal-desc').textContent = `"#${room.name}" is password protected.`;
  pwOverlay.classList.remove('hidden');
  setTimeout(() => pwInput.focus(), 50);
}

pwSubmitBtn.addEventListener('click', () => {
  if (!pendingRoom) return;
  if (pwInput.value === pendingRoom.password) {
    unlockedRooms.add(pendingRoom.name);
    pwOverlay.classList.add('hidden');
    switchRoom(pendingRoom.name);
    pendingRoom = null;
  } else {
    showErr(pwError, 'wrong password');
    pwInput.value = '';
    pwInput.focus();
  }
});

/* ── switch room ── */
async function switchRoom(name) {
  if (name === currentRoom) return;
  currentRoom = name;
  roomTitle.textContent = `#${name}`;
  messagesEl.innerHTML = '';
  typingMap = {}; presenceMap = {};
  typingBar.textContent = ''; presenceEl.textContent = '';
  renderRoomList();
  if (msgChannel)  { await sb.removeChannel(msgChannel);  msgChannel  = null; }
  if (presChannel) { await sb.removeChannel(presChannel); presChannel = null; }
  await loadMessages();
  await subscribeToRoom();
  msgInput.focus();
}

/* ── load messages ── */
async function loadMessages() {
  const { data } = await sb
    .from('messages')
    .select('*')
    .eq('room', currentRoom)
    .order('created_at', { ascending: false })
    .limit(MSG_HISTORY);
  (data || []).reverse().forEach(renderMsg);
}

/* ── subscribe realtime ── */
async function subscribeToRoom() {
  msgChannel = sb.channel(`room:${currentRoom}:msgs`)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'messages',
      filter: `room=eq.${currentRoom}`
    }, p => renderMsg(p.new))
    .subscribe();

  presChannel = sb.channel(`room:${currentRoom}:pres`, { config: { presence: { key: myName } } });
  presChannel
    .on('presence', { event: 'sync' }, () => {
      const state = presChannel.presenceState();
      presenceMap = {};
      Object.values(state).flat().forEach(p => { presenceMap[p.username] = true; });
      updatePresence();
    })
    .on('presence', { event: 'join' }, ({ newPresences }) => {
      newPresences.forEach(p => { presenceMap[p.username] = true; if (p.username !== myName) renderSys(`${p.username} joined`); });
      updatePresence();
    })
    .on('presence', { event: 'leave' }, ({ leftPresences }) => {
      leftPresences.forEach(p => { delete presenceMap[p.username]; renderSys(`${p.username} left`); });
      updatePresence();
    })
    .on('broadcast', { event: 'typing' }, ({ payload }) => showTyping(payload.username))
    .subscribe(async status => {
      if (status === 'SUBSCRIBED') await presChannel.track({ username: myName });
    });
}

async function enterChatAsUser(user) {
  myName  = user.user_metadata?.full_name || user.email.split('@')[0];
  myColor = pickColor(myName);
  myAvatar = user.user_metadata?.avatar_url || null;

  const { data: roomData } = await sb.from('rooms').select('name,locked,password').order('created_at');
  if (roomData && roomData.length > 0) {
    const dbRooms = roomData.map(r => ({ name: r.name, locked: r.locked || false, password: r.password || null }));
    const existing = new Set(DEFAULT_ROOMS.map(r => r.name));
    dbRooms.forEach(r => { if (!existing.has(r.name)) rooms.push(r); else { const def = rooms.find(d => d.name === r.name); if (def) { def.locked = r.locked; def.password = r.password; } } });
  }

  joinScreen.style.display = 'none';
  chatScreen.style.display = 'block';
  roomTitle.textContent = `#${currentRoom}`;
  renderRoomList();
  await loadMessages();
  await subscribeToRoom();
  msgInput.focus();
}

createConfirm.addEventListener('click', async () => {
  hideErr(createError);
  const name = createNameInput.value.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,'');
  if (!name || name.length < 2) { showErr(createError, 'name too short'); return; }
  if (rooms.find(r => r.name === name)) { showErr(createError, 'room already exists'); return; }
  const locked = createLockCheck.checked;
  const password = locked ? createPwInput.value : null;
  if (locked && !password) { showErr(createError, 'set a password for private room'); return; }

  await sb.from('rooms').insert({ name, locked, password });
  const newRoom = { name, locked, password };
  rooms.push(newRoom);
  if (!locked) unlockedRooms.add(name);
  else unlockedRooms.add(name); // creator auto-unlocked
  renderRoomList();
  createOverlay.classList.add('hidden');
  switchRoom(name);
});

/* ── send text ── */
async function sendMsg() {
  const text = msgInput.value.trim();
  if (!text || text.length > 400) return;
  // warn if message is ALL swears with nothing else
  // check if message contains ANY swear word
  function containsSwear(str) {
    const norm = normalizeLeet(str);
    const singleHit = SWEARS.filter(w => !w.includes(' ')).some(w => {
      const nw = normalizeLeet(w);
      return norm.split(/\s+/).some(token => normalizeLeet(token) === nw || normalizeLeet(token).includes(nw));
    });
    if (singleHit) return true;
    const phraseHit = SWEARS.filter(w => w.includes(' ')).some(w => norm.includes(normalizeLeet(w)));
    if (phraseHit) return true;
    if (filterInstance) { try { return filterInstance.isProfane(str); } catch(e) {} }
    return false;
  }
  if (containsSwear(text)) {
    msgInput.style.borderColor = 'var(--danger)';
    msgInput.style.color = 'var(--danger)';
    const prev = msgInput.placeholder;
    msgInput.placeholder = 'unexpected error. please try again';
    msgInput.value = '';
    setTimeout(() => {
      msgInput.style.borderColor = '';
      msgInput.style.color = '';
      msgInput.placeholder = prev;
    }, 2500);
    return;
  }
  if (Date.now() - lastSent < RATE_LIMIT_MS) return;
  lastSent = Date.now();
  sendBtn.disabled = true;
  const saved = msgInput.value;
  msgInput.value = '';
  const { error } = await sb.from('messages').insert({ username: myName, color: myColor, content: text, room: currentRoom, gif_url: null, avatar_url: myAvatar });
  if (error) msgInput.value = saved;
  sendBtn.disabled = false;
  msgInput.focus();
}

sendBtn.addEventListener('click', sendMsg);
msgInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } });

  presChannel.send({ type: 'broadcast', event: 'typing', payload: { username: myName } });
  typingTimer = setTimeout(() => {}, 2500);
});

async function loadTrendingGifs() {
  if (GIPHY_KEY === 'PASTE_YOUR_GIPHY_KEY_HERE') {
    gifStatus.textContent = 'add your Giphy API key to enable GIFs';
    gifStatus.style.display = 'block'; gifGrid.style.display = 'none'; return;
  }
  gifStatus.textContent = 'loading...';
  gifStatus.style.display = 'block'; gifGrid.style.display = 'none';
  try {
    const res = await fetch(`https://api.giphy.com/v1/gifs/trending?api_key=${GIPHY_KEY}&limit=12&rating=g`);
    const data = await res.json();
    renderGifs(data.data);
  } catch(e) { gifStatus.textContent = 'could not load GIFs'; }
}

async function searchGifs(query) {
  if (!query) { loadTrendingGifs(); return; }
  if (GIPHY_KEY === 'PASTE_YOUR_GIPHY_KEY_HERE') return;
  gifStatus.textContent = 'searching...';
  gifStatus.style.display = 'block'; gifGrid.style.display = 'none';
  try {
    const res = await fetch(`https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_KEY}&q=${encodeURIComponent(query)}&limit=12&rating=g`);
    const data = await res.json();
    if (!data.data.length) { gifStatus.textContent = 'no results'; return; }
    renderGifs(data.data);
  } catch(e) { gifStatus.textContent = 'search failed'; }
}

function renderGifs(gifs) {
  gifGrid.innerHTML = '';
  gifStatus.style.display = 'none'; gifGrid.style.display = 'grid';
  gifs.forEach(gif => {
    const url = gif.images.fixed_height_small.url;
    const full = gif.images.downsized.url;
    const img = document.createElement('img');
    img.className = 'gif-thumb';
    img.src = url;
    img.alt = gif.title || 'gif';
    img.loading = 'lazy';
    img.addEventListener('click', () => sendGif(full));
    gifGrid.appendChild(img);
  });
}
